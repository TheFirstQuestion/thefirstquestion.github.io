<!DOCTYPE html>
<html>



<head>
	<title>Verb Game</title>
	<link type="text/css" rel="stylesheet"; href="../Style/verb game style.css">
	<link type="text/css" rel="stylesheet" href="../Style/rth style.css">
	<script type="text/javascript"; src="../Scripts/verb game script.js"></script>
	<link rel="shortcut icon" href="../favicon.ico" />
</head>


<body>


<span id="fullVerb">Full Verb Form</span>

<h1 id="verb">Conjugated Verb</h1>

<div id="container">

	<div id="tense" class="choices">
		<span class="header" id="tenseHead">Tense</span>
		<form action="">
			<input type="radio" name="tense" value="present" id="tense1button"><label for="tense1button" id="tense1">Present</label><br>
			<input type="radio" name="tense" value="future" id="tense2button"><label for="tense2button" id="tense2">Future</label><br>
			<input type="radio" name="tense" value="imperfect" id="tense3button"><label for="tense3button" id="tense3">Imperfect</label><br>
			<input type="radio" name="tense" value="perfect" id="tense4button"><label for="tense4button" id="tense4">Perfect</label><br>
			<input type="radio" name="tense" value="pluperfect" id="tense5button"><label for="tense5button" id="tense5">Pluperfect</label><br>
			<input type="radio" name="tense" value="futureperfect" id="tense6button"><label for="tense6button" id="tense6">Future Perfect</label><br>
		</form>
	</div>
	
	<div id="person" class="choices">
		<span class="header" id="personHead">Person</span>
		<form action="">
			<input type="radio" name="person" value="first" id="person1button"><label for="person1button" id="person1">First</label><br>
			<input type="radio" name="person" value="second" id="person2button"><label for="person2button" id="person2">Second</label><br>
			<input type="radio" name="person" value="third" id="person3button"><label for="person3button" id="person3">Third</label><br>
		</form>
	</div>
	
	<div id="number" class="choices">
		<span class="header" id="numberHead">Number</span>
		<form action="">
			<input type="radio" name="number" value="singular" id="number1button"><label for="number1button" id="number1">Singular</label><br>
			<input type="radio" name="number" value="plural" id="number2button"><label for="number2button" id="number2">Plural</label><br>
		</form>
	</div>
	
	<div id="voice" class="choices">
		<span class="header" id="voiceHead">Voice</span>
		<form action="">
			<input type="radio" name="voice" value="active" id="voice1button"><label for="voice1button" id="voice1">Active</label><br>
			<input type="radio" name="voice" value="passive" id="voice2button"><label for="voice2button" id="voice2">Passive</label><br>
		</form>
	</div>
</div>	

<br><br><br><br>


<button onclick="makeAVerb()">Make a Verb!</button>
<button onclick="check()">Check Answers</button>


<a href="../index.html" id="returnToHome">Return to Main Page</a>	

</body>


</html>
